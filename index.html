<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a73e8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="La Mia Auto">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<title>Dov'è la mia auto</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f4ff; height: 100%; overflow: hidden; }
.app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }
.hdr { background: #1a73e8; color: #fff; padding: 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
.hdr-icon { font-size: 28px; }
.hdr h1 { font-size: 18px; font-weight: 700; }
.hdr p { font-size: 12px; opacity: .8; margin-top: 1px; }
.main { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.save-btn { width: 100%; padding: 20px; background: #1a73e8; color: #fff; border: none; border-radius: 16px; font-size: 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 14px rgba(26,115,232,.4); transition: transform .1s; }
.save-btn:active { transform: scale(.97); }
.save-btn:disabled { background: #93b8f7; box-shadow: none; cursor: not-allowed; }
.status { text-align: center; font-size: 13px; color: #666; min-height: 20px; }
.status.error { color: #d32f2f; }
.status.ok { color: #2e7d32; }
.card { background: #fff; border-radius: 16px; box-shadow: 0 2px 10px rgba(0,0,0,.08); overflow: hidden; }
.card-hdr { padding: 14px 16px 10px; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.card-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.card-addr { font-size: 16px; font-weight: 600; color: #111; line-height: 1.4; border: none; background: none; padding: 0; width: 100%; font-family: inherit; cursor: text; }
.card-addr:focus { outline: none; border-bottom: 2px solid #1a73e8; }
.card-addr-hint { font-size: 11px; color: #aaa; margin-top: 2px; }
.card-time { font-size: 12px; color: #888; margin-top: 4px; }
.clear-btn { background: none; border: none; color: #bbb; font-size: 20px; cursor: pointer; padding: 4px; flex-shrink: 0; }
.clear-btn:hover { color: #d32f2f; }
#map { height: 240px; }
.nav-btn { width: calc(100% - 32px); margin: 0 16px 16px; padding: 14px; background: #2e7d32; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 3px 10px rgba(46,125,50,.35); }
.nav-btn:active { transform: scale(.97); }
.empty { text-align: center; padding: 32px 20px; color: #888; }
.empty .big-icon { font-size: 56px; margin-bottom: 12px; }
.empty h2 { font-size: 16px; color: #444; margin-bottom: 6px; }
.empty p { font-size: 13px; line-height: 1.6; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; flex-shrink: 0; }
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-icon">🚗</div>
    <div><h1>Dov'è la mia auto</h1><p>Salva e ritrova la tua auto</p></div>
  </div>
  <div class="main">
    <button class="save-btn" id="save-btn" onclick="saveParking()">📍 Salva posizione auto</button>
    <div class="status" id="status"></div>
    <div id="parking-card" style="display:none">
      <div class="card">
        <div class="card-hdr">
          <div>
            <div class="card-label">Auto parcheggiata qui</div>
            <input class="card-addr" id="card-addr" type="text" value="" oninput="saveAddr(this.value)">
            <div class="card-addr-hint">✏️ Tocca per correggere</div>
            <div class="card-time" id="card-time"></div>
          </div>
          <button class="clear-btn" onclick="clearParking()" title="Cancella">✕</button>
        </div>
        <div id="map"></div>
      </div>
      <button class="nav-btn" onclick="navigateToParking()">🧭 Portami all'auto</button>
    </div>
    <div id="empty-state" class="empty">
      <div class="big-icon">🅿️</div>
      <h2>Nessuna posizione salvata</h2>
      <p>Premi il bottone blu quando parcheggi l'auto.</p>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
var leafletMap = null;
var marker = null;
var STORAGE_KEY = 'mia_auto_v2';

function setStatus(msg, type) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
}

function saveAddr(val) {
  var raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  var p = JSON.parse(raw);
  p.addr = val;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}

async function reverseGeocode(lat, lon) {
  try {
    var res = await fetch('https://photon.komoot.io/reverse?lon=' + lon + '&lat=' + lat + '&lang=it');
    var data = await res.json();
    var p = data && data.features && data.features[0] && data.features[0].properties;
    if (p) {
      var road = p.street || p.name || '';
      var num = p.housenumber ? ' ' + p.housenumber : '';
      var city = p.city || p.town || p.village || '';
      if (road) return road + num + (city ? ', ' + city : '');
    }
  } catch(e) {}
  try {
    var res2 = await fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json&accept-language=it', { headers: { 'User-Agent': 'MiaAutoApp/1.0' } });
    var data2 = await res2.json();
    var a = data2.address || {};
    var road2 = a.road || a.pedestrian || a.footway || '';
    var num2 = a.house_number ? ' ' + a.house_number : '';
    var city2 = a.city || a.town || a.village || a.municipality || '';
    if (road2) return road2 + num2 + (city2 ? ', ' + city2 : '');
  } catch(e2) {}
  return lat.toFixed(5) + ', ' + lon.toFixed(5);
}

function getGPS() {
  return new Promise(function(resolve, reject) {
    if (!navigator.geolocation) { reject({ code: 0 }); return; }
    var best = null;
    var watchId = null;
    var timer = setTimeout(function() {
      navigator.geolocation.clearWatch(watchId);
      if (best) resolve(best);
      else reject({ code: 3 });
    }, 20000);
    watchId = navigator.geolocation.watchPosition(
      function(pos) {
        best = pos;
        var acc = Math.round(pos.coords.accuracy);
        setStatus('📡 GPS: ±' + acc + 'm' + (acc > 30 ? ' — aspetto segnale migliore…' : ''));
        if (acc <= 30) {
          clearTimeout(timer);
          navigator.geolocation.clearWatch(watchId);
          resolve(pos);
        }
      },
      function(err) { clearTimeout(timer); navigator.geolocation.clearWatch(watchId); reject(err); },
      { enableHighAccuracy: true, maximumAge: 0 }
    );
  });
}

async function saveParking() {
  var btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Ricerca GPS…';
  setStatus('📡 GPS: in attesa…');
  try {
    var pos = await getGPS();
    var lat = pos.coords.latitude;
    var lon = pos.coords.longitude;
    var acc = Math.round(pos.coords.accuracy);
    btn.innerHTML = '<div class="spinner"></div> Trovando indirizzo…';
    var addr = await reverseGeocode(lat, lon);
    var parking = { lat: lat, lon: lon, addr: addr, acc: acc, ts: Date.now() };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(parking));
    btn.disabled = false;
    btn.innerHTML = '📍 Salva posizione auto';
    setStatus('✓ Posizione salvata (±' + acc + 'm)', 'ok');
    showParking(parking);
  } catch(err) {
    btn.disabled = false;
    btn.innerHTML = '📍 Salva posizione auto';
    var msgs = { 0: 'GPS non disponibile.', 1: 'Permesso GPS negato. Abilitalo nelle impostazioni.', 2: 'Segnale GPS non disponibile. Prova all\'aperto.', 3: 'GPS troppo impreciso. Riprova all\'aperto.' };
    setStatus(msgs[err.code] || 'Errore GPS.', 'error');
  }
}

function showParking(parking) {
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('parking-card').style.display = 'block';
  document.getElementById('card-addr').value = parking.addr;
  var d = new Date(parking.ts);
  var dateStr = d.toLocaleDateString('it-IT', { weekday: 'short', day: 'numeric', month: 'short' });
  var timeStr = d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('card-time').textContent = 'Salvata ' + dateStr + ' alle ' + timeStr + ' · ±' + parking.acc + 'm';
  setTimeout(function() {
    if (!leafletMap) {
      leafletMap = L.map('map', { zoomControl: false, attributionControl: false }).setView([parking.lat, parking.lon], 17);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(leafletMap);
    } else {
      leafletMap.setView([parking.lat, parking.lon], 17);
      if (marker) leafletMap.removeLayer(marker);
    }
    var carSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 72" width="40" height="72"><ellipse cx="20" cy="68" rx="14" ry="3.5" fill="rgba(0,0,0,0.22)"/><rect x="4" y="14" width="32" height="48" rx="8" fill="white" stroke="#ccc" stroke-width="1.5"/><path d="M9 14 Q9 4 20 3 Q31 4 31 14 Z" fill="white" stroke="#ccc" stroke-width="1.5"/><path d="M9 62 Q9 70 20 71 Q31 70 31 62 Z" fill="#e8e8e8" stroke="#ccc" stroke-width="1.5"/><path d="M11 15 Q11 24 20 25 Q29 24 29 15 Z" fill="#b8d8f0" opacity="0.85"/><path d="M11 56 Q11 63 20 63 Q29 63 29 56 Z" fill="#b8d8f0" opacity="0.7"/><rect x="10" y="26" width="20" height="28" rx="2" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/><ellipse cx="15" cy="31" rx="3" ry="3.5" fill="#ddd"/><ellipse cx="25" cy="31" rx="3" ry="3.5" fill="#ddd"/><rect x="1" y="20" width="4" height="7" rx="2" fill="#e0e0e0" stroke="#bbb" stroke-width="0.8"/><rect x="35" y="20" width="4" height="7" rx="2" fill="#e0e0e0" stroke="#bbb" stroke-width="0.8"/><path d="M9 8 Q9 5 13 5 L13 9 Q11 9 9 8 Z" fill="#fffde7" stroke="#f9a825" stroke-width="0.5"/><path d="M31 8 Q31 5 27 5 L27 9 Q29 9 31 8 Z" fill="#fffde7" stroke="#f9a825" stroke-width="0.5"/><path d="M9 65 Q9 68 13 68 L13 64 Q11 64 9 65 Z" fill="#ffcdd2" stroke="#c62828" stroke-width="0.5"/><path d="M31 65 Q31 68 27 68 L27 64 Q29 64 31 65 Z" fill="#ffcdd2" stroke="#c62828" stroke-width="0.5"/><rect x="1" y="16" width="6" height="10" rx="2" fill="#333"/><rect x="33" y="16" width="6" height="10" rx="2" fill="#333"/><rect x="1" y="46" width="6" height="10" rx="2" fill="#333"/><rect x="33" y="46" width="6" height="10" rx="2" fill="#333"/></svg>';
    var carIcon = L.divIcon({ html: '<div style="filter:drop-shadow(0 2px 5px rgba(0,0,0,.35))">' + carSvg + '</div>', className: '', iconSize: [40, 72], iconAnchor: [20, 64] });
    marker = L.marker([parking.lat, parking.lon], { icon: carIcon }).addTo(leafletMap);
    leafletMap.invalidateSize();
  }, 80);
}

function clearParking() {
  if (!confirm('Cancellare la posizione salvata?')) return;
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('parking-card').style.display = 'none';
  document.getElementById('empty-state').style.display = 'block';
  setStatus('');
  if (marker && leafletMap) { leafletMap.removeLayer(marker); marker = null; }
}

function navigateToParking() {
  var raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  var p = JSON.parse(raw);
  var isIos = /iPad|iPhone|iPod/.test(navigator.userAgent);
  var url = isIos
    ? 'maps://maps.apple.com/?daddr=' + p.lat + ',' + p.lon
    : 'https://www.google.com/maps/dir/?api=1&destination=' + p.lat + ',' + p.lon + '&travelmode=walking';
  window.open(url, '_blank');
}

(function() {
  var raw = localStorage.getItem(STORAGE_KEY);
  if (raw) { try { showParking(JSON.parse(raw)); } catch(e) { localStorage.removeItem(STORAGE_KEY); } }
})();
</script>
</body>
</html>
